<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0A0A;--bg2:#111;--bg3:#181818;--bd:#1E1E1E;
  --tx:#F0EDE6;--tx2:#888;--tx3:#444;
  --gold:#D4A843;--green:#10B981;--red:#EF4444;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,sans-serif;overflow:hidden}
#root{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* HEADER — padding-top fixe pour couvrir la status bar iOS */
#hdr{
  background:var(--bg);
  padding:70px 16px 0;
  border-bottom:1px solid var(--bd);
  flex-shrink:0;
}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hdr-sub{font-size:10px;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;margin-bottom:2px}
.hdr-name{font-size:17px;font-weight:800;letter-spacing:-0.5px}
.wbadge{border-radius:10px;padding:4px 10px;text-align:center;border:1px solid}
.wbadge .wn{font-size:16px;font-weight:900;line-height:1}
.wbadge .wl{font-size:9px;letter-spacing:1px;text-transform:uppercase;opacity:.7}

.nav-row{display:flex;gap:6px;padding:6px 0;overflow-x:auto;scrollbar-width:none}
.nav-row::-webkit-scrollbar{display:none}
.ntab{flex:0 0 auto;padding:5px 14px;border-radius:20px;border:none;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}

.wtabs{display:flex;gap:4px;padding:5px 0 8px;overflow-x:auto;scrollbar-width:none}
.wtabs::-webkit-scrollbar{display:none}
.wtab{flex:0 0 auto;padding:4px 12px;border-radius:7px;border:none;font-weight:700;font-size:12px;cursor:pointer}

.prog{padding:3px 0 8px}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:var(--tx3);letter-spacing:1px;margin-bottom:4px}
.prog-track{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}

/* DAY TABS */
#dtabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg)}
.dtab{flex:1;padding:9px 4px;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent}
.dtab .dl{font-size:10px;font-weight:800;letter-spacing:1.5px}
.dtab .dc{font-size:9px;color:var(--tx3);margin-top:2px}

/* SCROLL */
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 30px}

/* COLLAPSIBLE */
.coll{background:var(--bg2);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid var(--bd)}
.coll-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;user-select:none}
.coll-hdr:active{opacity:.8}
.coll-left{display:flex;align-items:center;gap:10px}
.coll-icon{font-size:18px}
.coll-title{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.coll-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.coll-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.coll-pill{font-size:10px;border-radius:4px;padding:3px 8px;font-weight:700}
.chev{font-size:12px;color:var(--tx3)}
.coll-body{border-top:1px solid var(--bd);padding:12px 14px;display:none}
.coll-body.open{display:block}

.row{padding:7px 0;border-bottom:1px solid #141414}
.row:last-child{border-bottom:none}
.row-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.row-name{font-size:12px;color:#DDD;font-weight:600;line-height:1.3}
.row-det{font-size:11px;font-weight:700;flex-shrink:0}
.row-note{font-size:11px;color:#555;margin-top:3px;line-height:1.4}

/* SESSION */
.sess{background:var(--bg2);border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid var(--bd)}
.sess-eye{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:5px}
.sess-obj{font-size:13px;color:var(--tx2);line-height:1.5;margin-top:4px}
.sess-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.sess-meta span{font-size:10px;color:var(--tx3);background:var(--bg3);border-radius:5px;padding:3px 8px}

/* EX */
.ex{background:var(--bg2);border-radius:14px;margin-bottom:8px;border:1px solid var(--bd);overflow:hidden}
.ex.s-done{border-color:rgba(16,185,129,.3)}
.ex.s-partial{border-color:rgba(212,168,67,.3)}
.ex.s-missed{border-color:rgba(239,68,68,.3)}
.ex.s-test{border-color:rgba(239,68,68,.4)}
.ex-hdr{padding:12px 14px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;user-select:none}
.ex-hdr:active{opacity:.8}
.ex-main{flex:1}
.ex-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:7px}
.badges{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.b{font-size:11px;border-radius:5px;padding:2px 8px;font-weight:700}
.b-d{background:rgba(212,168,67,.12);color:var(--gold)}
.b-c{background:var(--bg3);color:var(--tx2)}
.b-r1{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.2)}
.b-r2{background:rgba(99,102,241,.12);color:#6366F1;border:1px solid rgba(99,102,241,.2)}
.b-r3{background:rgba(212,168,67,.12);color:var(--gold);border:1px solid rgba(212,168,67,.2)}
.b-r4{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-done{background:rgba(212,168,67,.1);color:var(--gold);border:1px solid rgba(212,168,67,.25)}
.ex-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.sp{font-size:10px;font-weight:700;border-radius:5px;padding:2px 8px;border:1px solid}
.sp-done{background:rgba(16,185,129,.12);color:#10B981;border-color:rgba(16,185,129,.3)}
.sp-partial{background:rgba(212,168,67,.12);color:var(--gold);border-color:rgba(212,168,67,.3)}
.sp-missed{background:rgba(239,68,68,.12);color:var(--red);border-color:rgba(239,68,68,.3)}
.sp-empty{font-size:10px;color:var(--tx3)}

.ex-body{border-top:1px solid var(--bd);padding:12px 14px;display:none}
.ex-body.open{display:block}
.coach-note{background:var(--bg);border-radius:7px;padding:8px 10px;font-size:11px;color:#666;margin-bottom:12px;border-left:2px solid;line-height:1.6}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ig label{font-size:9px;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;display:block;margin-bottom:4px}
/* font-size 16px sur tous les inputs pour éviter le zoom iOS */
.ig input{width:100%;background:var(--bg);border:1px solid #2A2A2A;border-radius:7px;color:var(--tx);padding:8px 10px;font-size:16px;font-weight:700;font-family:inherit;outline:none;-webkit-appearance:none}
.ig textarea{width:100%;background:var(--bg);border:1px solid #2A2A2A;border-radius:7px;color:var(--tx);padding:8px 10px;font-size:16px;font-weight:400;font-family:inherit;outline:none;-webkit-appearance:none;resize:none;line-height:1.5}
.if{margin-bottom:10px}
.sbts{display:flex;gap:6px}
.sbt{flex:1;padding:9px 4px;border-radius:8px;border:1px solid #222;background:transparent;color:#555;font-weight:700;font-size:10px;cursor:pointer;font-family:inherit}
.sbt:active{opacity:.8}
.sbt.ad{background:rgba(16,185,129,.15);color:#10B981;border-color:rgba(16,185,129,.4)}
.sbt.ap{background:rgba(212,168,67,.15);color:var(--gold);border-color:rgba(212,168,67,.4)}
.sbt.am{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.4)}

.sess-note{background:var(--bg2);border-radius:14px;padding:14px 16px;border:1px solid var(--bd);margin-top:8px}
.sess-note label{font-size:9px;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;display:block;margin-bottom:8px}
.sess-note textarea{width:100%;background:var(--bg);border:1px solid #2A2A2A;border-radius:8px;color:var(--tx);padding:10px 12px;font-size:16px;resize:none;font-family:inherit;line-height:1.6;outline:none;-webkit-appearance:none}

.obj-card{background:var(--bg2);border-radius:14px;padding:14px 16px;border:1px solid var(--bd);margin-top:10px}
.obj-title{font-size:9px;letter-spacing:2px;color:var(--tx3);text-transform:uppercase;margin-bottom:10px}
.obj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.obj-item{background:var(--bg);border-radius:9px;padding:10px 12px;border:1px solid var(--bd)}
.obj-l{font-size:9px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.obj-a{font-size:20px;font-weight:900}
.obj-t{font-size:11px;color:var(--gold);margin-top:2px}

.mob-bloc{background:var(--bg2);border-radius:14px;margin-bottom:10px;overflow:hidden;border:1px solid rgba(139,92,246,.2)}
.hist-card{background:var(--bg2);border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--bd);cursor:pointer}
.hist-card:active{opacity:.8}
.empty{background:var(--bg2);border-radius:14px;padding:28px;text-align:center;color:var(--tx3);font-size:13px;border:1px solid var(--bd)}
.repos{background:var(--bg2);border-radius:14px;padding:28px;text-align:center;color:var(--tx3);font-size:15px;border:1px solid var(--bd)}
</style>
</head>

// STATE
const S={sem:1,jour:"lundi",tab:"programme",logs:{},notes:{}};
function lk(s,j,i){return s+"_"+j+"_"+i}
function gl(i){return S.logs[lk(S.sem,S.jour,i)]||{}}
function save(){try{localStorage.setItem("tr_logs",JSON.stringify(S.logs));localStorage.setItem("tr_notes",JSON.stringify(S.notes));}catch(e){}}
function load(){try{var l=localStorage.getItem("tr_logs");var n=localStorage.getItem("tr_notes");if(l)S.logs=JSON.parse(l);if(n)S.notes=JSON.parse(n);}catch(e){}}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function si(){return SW[S.sem-1]}
function rpeb(r){if(!r||r==="—")return"";var n=parseFloat(r);var c=n>=9?"b-r4":n>=8?"b-r3":n>=7?"b-r2":"b-r1";return'<span class="b '+c+'">RPE '+esc(r)+'</span>'}

// RENDER HEADER
function rHdr(){
  var w=si();
  var sDay=P[S.sem]&&P[S.sem][S.jour];
  var exs=(sDay&&sDay.exs)||[];
  var done=exs.filter(function(_,i){var l=S.logs[lk(S.sem,S.jour,i)];return l&&l.status==="fait";}).length;
  var pct=exs.length?Math.round(done/exs.length*100):0;
  var h='<div class="hdr-top"><div><div class="hdr-sub">Programme 6 Semaines</div><div class="hdr-name">Force & Explosivité</div></div>';
  h+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px"><div class="wbadge" style="background:'+w.c+'18;border-color:'+w.c+'55"><div class="wn" style="color:'+w.c+'">S'+w.n+'</div><div class="wl" style="color:'+w.c+'">'+w.l+'</div></div></div></div>';
  h+='<div class="nav-row">';
  ["programme","mobilite","historique"].forEach(function(t){
    var lbl=t==="programme"?"Programme":t==="mobilite"?"Mobilité":"Historique";
    h+='<button class="ntab" style="background:'+(S.tab===t?w.c:"#1A1A1A")+';color:'+(S.tab===t?"#000":"#555")+'" onclick="setTab(\''+t+'\')">'+lbl+'</button>';
  });
  h+='</div>';
  if(S.tab==="programme"){
    h+='<div class="wtabs">';
    SW.forEach(function(sw){h+='<button class="wtab" style="background:'+(S.sem===sw.n?sw.c:"#1A1A1A")+';color:'+(S.sem===sw.n?"#000":"#555")+'" onclick="setSem('+sw.n+')">S'+sw.n+'</button>';});
    h+='</div>';
    if(exs.length>0){
      h+='<div class="prog"><div class="prog-row"><span>PROGRESSION</span><span style="color:'+(pct===100?"#10B981":w.c)+';font-weight:700">'+done+'/'+exs.length+' · '+pct+'%</span></div>';
      h+='<div class="prog-track"><div class="prog-fill" style="width:'+pct+'%;background:'+(pct===100?"#10B981":w.c)+'"></div></div></div>';
    }
  }
  document.getElementById("hdr").innerHTML=h;
}

// RENDER DAY TABS
function rDays(){
  if(S.tab!=="programme"){document.getElementById("dtabs").innerHTML="";return;}
  var w=si();
  var h="";
  JOURS.forEach(function(j){
    var exs=(P[S.sem]&&P[S.sem][j]&&P[S.sem][j].exs)||[];
    var done=exs.filter(function(_,i){var l=S.logs[lk(S.sem,j,i)];return l&&l.status==="fait";}).length;
    var act=j===S.jour;
    h+='<button class="dtab" style="border-bottom-color:'+(act?w.c:"transparent")+'" onclick="setJour(\''+j+'\')">';
    h+='<div class="dl" style="color:'+(act?w.c:"#2A2A2A")+'">'+JL[j]+'</div>';
    h+='<div class="dc" style="color:'+(done===exs.length&&exs.length>0?"#10B981":"#222")+'">'+(exs.length>0?done+"/"+exs.length:"—")+'</div>';
    h+='</button>';
  });
  document.getElementById("dtabs").innerHTML=h;
}

// RENDER SCROLL
function rScroll(){
  var w=si();
  var h="";
  if(S.tab==="programme") h=rProg(w);
  else if(S.tab==="mobilite") h=rMob();
  else h=rHist(w);
  document.getElementById("scroll").innerHTML=h;
}

function rProg(w){
  var sDay=P[S.sem]&&P[S.sem][S.jour];
  if(!sDay)return"";
  var exs=sDay.exs||[];
  var h="";

  // ÉCHAUFFEMENT
  var spec=ECHAUFF_SPEC[S.jour]||[];

    h+='<div style="font-size:9px;letter-spacing:1.5px;color:#10B981;text-transform:uppercase;margin:10px 0 8px;padding-top:8px;border-top:1px solid #1E3A28">Module Spécifique — 3 min</div>';

  h+='</div></div>';

  h+='<div class="sess" style="border-color:'+w.c+'22"><div style="display:flex;align-items:center;gap:10px;margin-bottom:5px"><span style="font-size:22px">'+sDay.icon+'</span><div class="sess-eye" style="color:'+w.c+'">'+S.jour.toUpperCase()+' · '+esc(sDay.type)+'</div></div><div class="sess-obj">'+esc(sDay.obj)+'</div><div class="sess-meta"><span>RPE cible '+w.r+'</span>'+(exs.length?'<span>'+exs.length+' exercices</span>':'')+'</div></div>';

  // CONTENU
  if(S.jour==="mardi"){
    h+='<div class="coll" style="border-color:#8B5CF633;padding:14px 16px"><div style="font-size:12px;color:#8B5CF6;font-weight:700;margin-bottom:12px">🧘 Programme — 45 min</div>';
    MOBILITE.forEach(function(b){h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1A1A1A"><span style="font-size:13px;color:#DDD">'+b.titre+'</span><span style="font-size:11px;color:#8B5CF6;font-weight:700;background:#8B5CF611;border-radius:4px;padding:2px 8px">'+b.duree+'</span></div>';});
    h+='<div style="font-size:11px;color:#555;margin-top:10px">Voir onglet <strong style="color:#8B5CF6">Mobilité</strong> pour le détail</div></div>';
  }else if(S.jour==="vendredi"){
    h+='<div class="coll" style="border-color:#6366F133;padding:14px 16px"><div style="font-size:12px;color:#6366F1;font-weight:700;margin-bottom:12px">🔄 Récupération Active — ~30 min</div>';
    [{t:"10 min",d:"Protocole tendon rotulien (voir Prehab ci-dessous)"},{t:"8 min",d:"Protocole coiffe des rotateurs (voir Prehab ci-dessous)"},{t:"12 min",d:"Chevilles + hanches (version courte séance mardi)"}].forEach(function(i){
      h+='<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #1A1A1A"><span style="font-size:11px;color:#D4A843;font-weight:700;flex-shrink:0;width:50px">'+i.t+'</span><span style="font-size:12px;color:#888">'+i.d+'</span></div>';
    });
    h+='</div>';
  }else if(exs.length===0){
    h+='<div class="repos">💤 Repos — récupération active conseillée</div>';
  }else{
    exs.forEach(function(ex,i){
      var log=gl(i);
      var isTest=ex.n.indexOf("TEST")!==-1||ex.n.indexOf("🏆")!==-1;
      var cc="ex"+(log.status==="fait"?" s-done":log.status==="partiel"?" s-partial":log.status==="non-fait"?" s-missed":isTest?" s-test":"");
      var sp=log.status==="fait"?'<span class="sp sp-done">✓ Fait</span>':log.status==="partiel"?'<span class="sp sp-partial">◐ Partiel</span>':log.status==="non-fait"?'<span class="sp sp-missed">✗ Non fait</span>':'<span class="sp-empty">— À faire</span>';
      var isOpen=!!(S.logs["_op_"+lk(S.sem,S.jour,i)]);
      h+='<div class="'+cc+'"><div class="ex-hdr" onclick="te('+i+')"><div class="ex-main"><div class="ex-name" style="color:'+(isTest?w.c:"var(--tx)")+'">'+esc(ex.n)+'</div>';
      h+='<div class="badges"><span class="b b-d">'+esc(ex.d)+'</span><span class="b b-c">'+esc(ex.c)+'</span>'+rpeb(ex.r)+(log.chargeRealisee?'<span class="b b-done">✓ '+esc(log.chargeRealisee)+'</span>':'')+'</div></div>';
      h+='<div class="ex-right">'+sp+'<span class="chev" id="ec-'+i+'">'+(isOpen?"▲":"▼")+'</span></div></div>';
      h+='<div class="ex-body'+(isOpen?" open":"")+'" id="eb-'+i+'">';
      if(ex.note)h+='<div class="coach-note" style="border-color:'+w.c+'55">'+esc(ex.note)+'</div>';
      h+='<div class="ig"><div><label>Charge réalisée</label><input type="text" inputmode="text" placeholder="ex: 68kg" value="'+esc(log.chargeRealisee||"")+'" onchange="uf('+i+',\'chargeRealisee\',this.value)"></div>';
      h+='<div><label>RPE ressenti</label><input type="number" inputmode="decimal" min="1" max="10" placeholder="1-10" value="'+esc(log.rpeRessenti||"")+'" onchange="uf('+i+',\'rpeRessenti\',this.value)"></div></div>';
      h+='<div class="if"><label style="font-size:9px;letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;display:block;margin-bottom:4px">Ressenti / Commentaire</label>';
      h+='<textarea rows="2" placeholder="Sensations, ajustements..." onchange="uf('+i+',\'commentaire\',this.value)">'+esc(log.commentaire||"")+'</textarea></div>';
      h+='<div class="sbts"><button class="sbt'+(log.status==="fait"?" ad":"")+'" onclick="ss('+i+',\'fait\')">✓ Fait</button><button class="sbt'+(log.status==="partiel"?" ap":"")+'" onclick="ss('+i+',\'partiel\')">◐ Partiel</button><button class="sbt'+(log.status==="non-fait"?" am":"")+'" onclick="ss('+i+',\'non-fait\')">✗ Non fait</button></div>';
      h+='</div></div>';
    });
  }

  // PREHAB
  if(PREHAB_JOURS.indexOf(S.jour)!==-1){
    var pr=PREHAB_R.filter(function(p){return p.s===S.sem;})[0]||PREHAB_R[0];
    h+='<div class="coll" style="background:#1A0F0F;border-color:#EF444433;margin-top:6px">';
    h+='<div class="coll-hdr" onclick="tc(\'prh\')"><div class="coll-left"><span class="coll-icon">🛡️</span><div><div class="coll-title" style="color:#EF4444">Prehab — Après séance</div><div class="coll-sub">Tendon rotulien + Coiffe — ~18 min</div></div></div>';
    h+='<div class="coll-right"><span class="coll-pill" style="background:#EF444415;color:#EF4444">S'+S.sem+'</span><span class="chev" id="cv-prh">▼</span></div></div>';
    h+='<div class="coll-body" id="cb-prh">';
    h+='<div style="font-size:9px;letter-spacing:1.5px;color:#EF4444;text-transform:uppercase;margin-bottom:8px">Tendon Rotulien — Protocole Stanish</div>';
    h+='<div style="background:#0A0A0A;border-radius:8px;padding:12px;border:1px solid #EF444422;margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:6px">'+esc(pr.ex)+'</div><div style="display:flex;gap:8px;flex-wrap:wrap"><span style="font-size:12px;color:#EF4444;background:#EF444411;border-radius:4px;padding:3px 8px;font-weight:700">'+esc(pr.fmt)+'</span><span style="font-size:12px;color:#888;background:#1A1A1A;border-radius:4px;padding:3px 8px">'+esc(pr.ch)+'</span></div><div style="font-size:11px;color:#666;margin-top:8px;border-left:2px solid #EF444455;padding-left:8px;line-height:1.5">'+esc(pr.note)+'</div></div>';
    h+='<div style="font-size:9px;letter-spacing:1.5px;color:#EF4444;text-transform:uppercase;margin-bottom:8px">Coiffe des Rotateurs</div>';
    PREHAB_C.forEach(function(e){h+='<div class="row"><div class="row-top"><span class="row-name">'+esc(e.n)+'</span><span class="row-det" style="color:#EF4444">'+esc(e.d)+'</span></div><div class="row-note">'+esc(e.note)+'</div></div>';});
    h+='</div></div>';
  }

  // NOTE SESSION
  if(exs.length>0&&S.jour!=="mardi"&&S.jour!=="vendredi"){
    var nv=S.notes[S.sem+"_"+S.jour]||"";
    h+='<div class="sess-note"><label>📝 Note de séance</label><textarea rows="3" placeholder="Ressenti général, fatigue, points à corriger..." onchange="sn(this.value)">'+esc(nv)+'</textarea></div>';
  }

  // OBJECTIFS S1 LUNDI
  if(S.sem===1&&S.jour==="lundi"){
    h+='<div class="obj-card"><div class="obj-title">Objectifs du Cycle</div><div class="obj-grid">';
    [{l:"Arraché",a:"86kg",t:"90-92kg"},{l:"Épaulé-Jeté",a:"115kg",t:"119-122kg"},{l:"Squat",a:"165kg",t:"172-178kg"},{l:"Ratio Arr./Squat",a:"52%",t:">54%"}].forEach(function(o){
      h+='<div class="obj-item"><div class="obj-l">'+o.l+'</div><div class="obj-a">'+o.a+'</div><div class="obj-t">→ '+o.t+'</div></div>';
    });
    h+='</div></div>';
  }
  return h;
}

function rMob(){
  var h='<div style="background:var(--bg2);border-radius:14px;padding:14px 16px;border:1px solid #8B5CF622;margin-bottom:14px"><div style="font-size:10px;letter-spacing:1.5px;color:#8B5CF6;text-transform:uppercase;font-weight:700;margin-bottom:4px">🧘 MARDI — Mobilité & Stretching</div><div style="font-size:13px;color:#888">~45 min · Pas de charge · Qualité d\'amplitude uniquement</div></div>';
  MOBILITE.forEach(function(b,bi){
    var bid="mb-"+bi;var cid="mc-"+bi;
    h+='<div class="mob-bloc"><div class="coll-hdr" onclick="tm('+bi+')" style="background:var(--bg2)"><div class="coll-left"><div><div class="coll-title" style="color:'+b.c+'">'+b.titre+'</div></div></div><div class="coll-right"><span class="coll-pill" style="background:'+b.c+'15;color:'+b.c+'">'+b.duree+'</span><span class="chev" id="'+cid+'">▼</span></div></div>';
    h+='<div class="coll-body" id="'+bid+'" style="background:#0D0D0D">';
    b.exs.forEach(function(e){h+='<div class="row"><div class="row-top"><span class="row-name">'+esc(e.n)+'</span><span class="row-det" style="color:'+b.c+'">'+esc(e.d)+'</span></div>'+(e.note?'<div class="row-note">'+esc(e.note)+'</div>':'')+'</div>';});
    h+='</div></div>';
  });
  return h;
}

function rHist(w){
  var sessions=[];
  for(var s=1;s<=6;s++){
    JOURS.forEach(function(j){
      var exs=(P[s]&&P[s][j]&&P[s][j].exs)||[];
      var hasData=exs.some(function(_,i){var l=S.logs[lk(s,j,i)];return l&&l.status;});
      if(hasData){
        var done=exs.filter(function(_,i){var l=S.logs[lk(s,j,i)];return l&&l.status==="fait";}).length;
        sessions.push({s:s,j:j,exs:exs,done:done});
      }
    });
  }
  if(!sessions.length)return'<div class="empty">Aucune séance enregistrée<br><span style="font-size:11px;color:#2A2A2A">Commence à remplir ton programme !</span></div>';
  var h="";
  sessions.forEach(function(sess){
    var sw=SW[sess.s-1];var prog=P[sess.s]&&P[sess.s][sess.j];
    var note=S.notes[sess.s+"_"+sess.j];
    var pct=Math.round(sess.done/sess.exs.length*100);
    var tags=sess.exs.map(function(ex,i){var l=S.logs[lk(sess.s,sess.j,i)];return(l&&l.chargeRealisee)?{n:ex.n,c:l.chargeRealisee}:null;}).filter(Boolean).slice(0,4);
    h+='<div class="hist-card" style="border-color:'+sw.c+'22" onclick="gt('+sess.s+',\''+sess.j+'\')">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:'+sw.c+';margin-bottom:2px">S'+sess.s+' — '+JL[sess.j]+'</div><div style="font-size:13px;font-weight:700">'+(prog?prog.icon+" "+esc(prog.type):"")+'</div></div>';
    h+='<div style="text-align:right"><div style="font-size:18px;font-weight:900;color:'+(pct===100?"#10B981":sw.c)+'">'+pct+'%</div><div style="font-size:10px;color:var(--tx3)">'+sess.done+'/'+sess.exs.length+'</div></div></div>';
    if(note)h+='<div style="font-size:11px;color:#555;border-left:2px solid '+sw.c+'44;padding-left:8px;margin-top:6px;line-height:1.5">'+esc(note.slice(0,120))+(note.length>120?"...":"")+'</div>';
    if(tags.length){h+='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">';tags.forEach(function(t){h+='<span style="font-size:10px;color:var(--gold);background:rgba(212,168,67,.08);border-radius:4px;padding:2px 7px">'+esc(t.n.split(" ").slice(0,2).join(" "))+': '+esc(t.c)+'</span>';});h+='</div>';}
    h+='</div>';
  });
  return h;
}

function render(){rHdr();rDays();rScroll();}

// ACTIONS — navigation avec render complet
function setSem(s){S.sem=s;S.jour="lundi";render();}
function setJour(j){S.jour=j;render();}
function setTab(t){S.tab=t;render();}
function gt(s,j){S.sem=s;S.jour=j;S.tab="programme";render();}

// TOGGLES — manipulation DOM directe, SANS render, SANS scroll reset
function tc(id){
  var b=document.getElementById("cb-"+id);
  var c=document.getElementById("cv-"+id);
  if(!b)return;
  var o=b.classList.toggle("open");
  if(c)c.textContent=o?"▲":"▼";
}
function te(i){
  var b=document.getElementById("eb-"+i);
  var c=document.getElementById("ec-"+i);
  if(!b)return;
  var o=b.classList.toggle("open");
  if(c)c.textContent=o?"▲":"▼";
  S.logs["_op_"+lk(S.sem,S.jour,i)]=o;
}
function tm(i){
  var b=document.getElementById("mb-"+i);
  var c=document.getElementById("mc-"+i);
  if(!b)return;
  var o=b.classList.toggle("open");
  if(c)c.textContent=o?"▲":"▼";
}

// INPUTS — onchange uniquement (pas oninput), pas de render
function uf(i,field,val){
  var k=lk(S.sem,S.jour,i);
  if(!S.logs[k])S.logs[k]={};
  S.logs[k][field]=val;
  save();
}

// STATUS BUTTONS — update DOM direct sans render complet
function ss(i,status){
  var k=lk(S.sem,S.jour,i);
  if(!S.logs[k])S.logs[k]={};
  S.logs[k].status=(S.logs[k].status===status)?null:status;
  save();
  // Update progress bar
  rHdr();
  rDays();
  // Update la carte spécifique dans le DOM
  var cards=document.querySelectorAll("#scroll .ex");
  var card=cards[i];
  if(!card)return;
  var log=S.logs[k]||{};
  var w=si();
  // Update classe
  card.className="ex"+(log.status==="fait"?" s-done":log.status==="partiel"?" s-partial":log.status==="non-fait"?" s-missed":"");
  // Update status pill
  var sp=card.querySelector(".sp,.sp-empty");
  if(sp){
    if(log.status==="fait"){sp.className="sp sp-done";sp.textContent="✓ Fait";}
    else if(log.status==="partiel"){sp.className="sp sp-partial";sp.textContent="◐ Partiel";}
    else if(log.status==="non-fait"){sp.className="sp sp-missed";sp.textContent="✗ Non fait";}
    else{sp.className="sp-empty";sp.textContent="— À faire";}
  }
  // Update boutons
  var btns=card.querySelectorAll(".sbt");
  btns.forEach(function(btn){
    btn.classList.remove("ad","ap","am");
    if(btn.textContent.indexOf("Fait")!==-1&&log.status==="fait")btn.classList.add("ad");
    else if(btn.textContent.indexOf("Partiel")!==-1&&log.status==="partiel")btn.classList.add("ap");
    else if(btn.textContent.indexOf("Non")!==-1&&log.status==="non-fait")btn.classList.add("am");
  });
}

function sn(val){S.notes[S.sem+"_"+S.jour]=val;save();}

load();render();
</script>
</body>
</html>
