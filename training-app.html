<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Training</title>
<style>
  :root {
    --bg: #0A0A0A;
    --bg2: #111111;
    --bg3: #181818;
    --border: #222222;
    --text: #F0EDE6;
    --text2: #888;
    --text3: #444;
    --gold: #D4A843;
    --green: #10B981;
    --red: #EF4444;
    --blue: #3B82F6;
    --indigo: #6366F1;
    --purple: #8B5CF6;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Pro Display', sans-serif; overflow: hidden; }
  #app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

  /* HEADER */
  .header {
    background: var(--bg);
    padding-top: calc(var(--safe-top) + 12px);
    padding: calc(var(--safe-top) + 12px) 16px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 50;
    flex-shrink: 0;
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .header-title { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 2px; }
  .header-name { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .week-badge { border-radius: 10px; padding: 5px 12px; text-align: center; border: 1px solid; }
  .week-badge .wnum { font-size: 18px; font-weight: 900; line-height: 1; }
  .week-badge .wlabel { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; }
  .save-status { font-size: 10px; text-align: right; margin-top: 3px; min-height: 14px; }

  /* SEMAINE TABS */
  .week-tabs { display: flex; gap: 4px; padding: 8px 0; overflow-x: auto; scrollbar-width: none; }
  .week-tabs::-webkit-scrollbar { display: none; }
  .week-tab { flex: 0 0 auto; padding: 5px 13px; border-radius: 7px; border: none; font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.15s; }

  /* PROGRESS BAR */
  .progress-bar-wrap { padding: 6px 0 10px; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text3); letter-spacing: 1px; margin-bottom: 5px; }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  /* NAV TABS (Programme / Historique) */
  .nav-tabs { display: flex; gap: 8px; padding: 8px 0; }
  .nav-tab { padding: 6px 16px; border-radius: 20px; border: none; font-weight: 700; font-size: 11px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; }

  /* JOURS */
  .day-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .day-tab { flex: 1; padding: 10px 4px; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .day-tab .dlabel { font-size: 10px; font-weight: 800; letter-spacing: 1.5px; transition: color 0.15s; }
  .day-tab .dcount { font-size: 9px; color: var(--text3); margin-top: 2px; }
  .day-tab.active .dcount { color: var(--green); }

  /* SCROLL AREA */
  .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 16px; padding-bottom: calc(var(--safe-bot) + 16px); }

  /* SESSION HEADER CARD */
  .session-card { background: var(--bg2); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border); margin-bottom: 14px; }
  .session-card .s-eyebrow { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
  .session-card .s-obj { font-size: 13px; color: var(--text2); line-height: 1.5; margin-top: 4px; }
  .session-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .session-meta span { font-size: 10px; color: var(--text3); background: var(--bg3); border-radius: 5px; padding: 3px 8px; }

  /* EXERCISE CARDS */
  .ex-card { background: var(--bg2); border-radius: 14px; margin-bottom: 8px; border: 1px solid var(--border); overflow: hidden; transition: border-color 0.2s; }
  .ex-card.done { border-color: rgba(16,185,129,0.25); }
  .ex-card.partial { border-color: rgba(212,168,67,0.25); }
  .ex-card.missed { border-color: rgba(239,68,68,0.25); }
  .ex-card.test { border-color: rgba(239,68,68,0.35); }

  .ex-header { padding: 12px 14px; cursor: pointer; display: flex; gap: 10px; align-items: flex-start; }
  .ex-main { flex: 1; }
  .ex-name { font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 7px; }
  .ex-badges { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .badge { font-size: 11px; border-radius: 5px; padding: 2px 8px; font-weight: 700; }
  .badge-detail { background: rgba(212,168,67,0.12); color: var(--gold); }
  .badge-charge { background: var(--bg3); color: var(--text2); }
  .badge-rpe-low { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
  .badge-rpe-mid { background: rgba(99,102,241,0.12); color: var(--indigo); border: 1px solid rgba(99,102,241,0.2); }
  .badge-rpe-high { background: rgba(212,168,67,0.12); color: var(--gold); border: 1px solid rgba(212,168,67,0.2); }
  .badge-rpe-max { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .badge-done-charge { background: rgba(212,168,67,0.1); color: var(--gold); border: 1px solid rgba(212,168,67,0.25); }

  .ex-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  .status-pill { font-size: 10px; font-weight: 700; border-radius: 5px; padding: 2px 8px; border: 1px solid; }
  .sp-done { background: rgba(16,185,129,0.12); color: var(--green); border-color: rgba(16,185,129,0.3); }
  .sp-partial { background: rgba(212,168,67,0.12); color: var(--gold); border-color: rgba(212,168,67,0.3); }
  .sp-missed { background: rgba(239,68,68,0.12); color: var(--red); border-color: rgba(239,68,68,0.3); }
  .sp-empty { font-size: 10px; color: var(--text3); }
  .chevron { font-size: 11px; color: var(--text3); }

  /* EXERCISE BODY */
  .ex-body { border-top: 1px solid var(--border); padding: 12px 14px; }
  .coach-note { background: var(--bg); border-radius: 7px; padding: 8px 10px; font-size: 11px; color: #666; margin-bottom: 12px; border-left: 2px solid; line-height: 1.6; }
  .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .input-group label { font-size: 9px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; display: block; margin-bottom: 4px; }
  .input-group input, .input-group textarea {
    width: 100%; background: var(--bg); border: 1px solid #2A2A2A; border-radius: 7px;
    color: var(--text); padding: 8px 10px; font-size: 14px; font-weight: 800;
    font-family: inherit; outline: none; -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .input-group input:focus, .input-group textarea:focus { border-color: #444; }
  .input-group textarea { font-size: 12px; font-weight: 400; resize: none; line-height: 1.5; }
  .input-full { margin-bottom: 10px; }
  .status-btns { display: flex; gap: 6px; }
  .status-btn { flex: 1; padding: 9px 4px; border-radius: 8px; border: 1px solid #222; background: transparent; color: #555; font-weight: 700; font-size: 10px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .status-btn.active-done { background: rgba(16,185,129,0.15); color: var(--green); border-color: rgba(16,185,129,0.4); }
  .status-btn.active-partial { background: rgba(212,168,67,0.15); color: var(--gold); border-color: rgba(212,168,67,0.4); }
  .status-btn.active-missed { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.4); }

  /* SESSION NOTE */
  .session-note-card { background: var(--bg2); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border); margin-top: 6px; }
  .session-note-card label { font-size: 9px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; display: block; margin-bottom: 8px; }
  .session-note-card textarea { width: 100%; background: var(--bg); border: 1px solid #2A2A2A; border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 12px; resize: none; font-family: inherit; line-height: 1.6; outline: none; -webkit-appearance: none; }
  .session-note-card textarea:focus { border-color: #444; }

  /* OBJECTIFS CARD */
  .objectifs-card { background: var(--bg2); border-radius: 14px; padding: 14px 16px; border: 1px solid var(--border); margin-top: 10px; }
  .objectifs-card .oc-title { font-size: 9px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
  .objectifs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .obj-item { background: var(--bg); border-radius: 9px; padding: 10px 12px; border: 1px solid var(--border); }
  .obj-item .obj-label { font-size: 9px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .obj-item .obj-current { font-size: 20px; font-weight: 900; }
  .obj-item .obj-target { font-size: 11px; color: var(--gold); margin-top: 2px; }

  /* HISTORIQUE */
  .hist-card { background: var(--bg2); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
  .hist-card:active { opacity: 0.8; }
  .hist-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .hist-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .hist-type { font-size: 13px; font-weight: 700; }
  .hist-pct { font-size: 18px; font-weight: 900; line-height: 1; }
  .hist-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .hist-note { font-size: 11px; color: #555; border-left: 2px solid; padding-left: 8px; margin-top: 6px; line-height: 1.5; }
  .hist-charges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .hist-charge-tag { font-size: 10px; color: var(--gold); background: rgba(212,168,67,0.08); border-radius: 4px; padding: 2px 7px; }

  /* EMPTY */
  .empty-state { background: var(--bg2); border-radius: 14px; padding: 28px 20px; text-align: center; color: var(--text3); font-size: 13px; border: 1px solid var(--border); }
  .empty-state p { margin-top: 6px; font-size: 11px; color: #2A2A2A; }

  /* REPOS */
  .repos-card { background: var(--bg2); border-radius: 14px; padding: 28px 20px; text-align: center; color: var(--text3); font-size: 15px; border: 1px solid var(--border); }
</style>
</head>

      {n:"Gammes Athlétiques",d:"4–6 × 15–20m",c:"—",r:"—",note:""},
      {n:"Haltéro Léger Explosif",d:"6 × 2",c:"~67kg (57%)",r:"—",note:"⚠️ DENSITÉ MAX — 6 séries"},
      {n:"Sprints",d:"5 × 30–40m",c:"—",r:"—",note:"Pic vitesse"},
      {n:"Sauts Haies ~60cm",d:"5 × 8",c:"—",r:"—",note:"⚠️ DENSITÉ MAX — 40 sauts"},
    ]},
    jeudi:{icon:"🎯",type:"Renforcement Full Body (variante)",obj:"⚠️ PIC Haut du Corps",exs:[
      {n:"Tractions (Force)",d:"5 × 2",c:"+27,5kg (80%)",r:"9",note:"⚠️ RPE 9 — max du cycle"},
      {n:"Isométrie Overcoming",d:"4 × 5 sec",c:"Max volontaire",r:"9",note:"⚠️ Intensité maximale"},
      {n:"Tirage d'Épaulé (Clean Pull)",d:"4 × 2",c:"~66kg (55%)",r:"6–7",note:"Stable — focus trajectoire"},
      {n:"Front Squat",d:"4 × 2",c:"113,5kg (83%)",r:"8–9",note:"Max du cycle"},
      {n:"Dips (Hypertrophie)",d:"3 × 6",c:"+26kg (64%)",r:"8",note:"Charge max"},
      {n:"Soulevé de Terre Roumain",d:"2 × 5",c:"~110kg (léger)",r:"5",note:"Volume ↓"},
    ]},
    samedi:{icon:"🏋️",type:"Haltérophilie Spécifique",obj:"⚠️ PIC TECHNIQUE",exs:[
      {n:"🔥 Plyo Haies ~60cm (PAP)",d:"4 × 7",c:"—",r:"—",note:"⚠️ Volume max samedi — 28 sauts"},
      {n:"Arraché Suspension",d:"3 × 2",c:"63kg (73%)",r:"8",note:"Charge max samedi"},
      {n:"Complexe Épaulé-Jeté",d:"2×(1+3) + 2×(3+1)",c:"~70kg",r:"7–8",note:"Charge max complexe"},
      {n:"Tractions Hautes (C2B)",d:"3 × 5",c:"+14kg",r:"7–8",note:""},
      {n:"Dips (léger)",d:"2 × 5",c:"+14kg",r:"5–6",note:""},
    ]},
  },
  5:{
    lundi:{icon:"💤",type:"Décharge",obj:"Dissiper la fatigue — Volume et intensité fortement réduits",exs:[
      {n:"Tirage d'arraché (Snatch Pull)",d:"3 × 2",c:"~56kg (65%)",r:"6",note:"⬇️ Maintien du pattern"},
      {n:"Box Squat",d:"3 × 2 @99kg",c:"99kg (60%)",r:"5–6",note:"⬇️ Charge réduite"},
      {n:"Hack Squat Dead Stop",d:"2 × 3",c:"60kg (50%)",r:"5",note:"⬇️ 50% uniquement"},
      {n:"Dips",d:"2 × 3",c:"+9kg",r:"5",note:"⬇️ Léger"},
      {n:"Tractions",d:"2 × 6",c:"Poids du corps",r:"5",note:"⬇️ PdC uniquement"},
    ]},
    mercredi:{icon:"💤",type:"Décharge Athlétique",obj:"Maintien neuromusculaire — Volume minimal",exs:[
      {n:"Gammes Athlétiques",d:"3–4 × 15m",c:"—",r:"—",note:"⬇️ Volume réduit"},
      {n:"Haltéro Léger Explosif",d:"2 × 2",c:"~58kg (50%)",r:"—",note:"⬇️ Minimum vital"},
      {n:"Sprints",d:"3 × 30m",c:"—",r:"—",note:"⬇️ Qualité sur volume réduit"},
      {n:"Sauts Haies ~60cm",d:"3 × 5",c:"—",r:"—",note:"⬇️ 15 sauts — maintien pattern"},
    ]},
    jeudi:{icon:"💤",type:"Décharge Haut du Corps",obj:"Récupération active",exs:[
      {n:"Tractions",d:"3 × 3",c:"+8kg",r:"6",note:"⬇️ Très léger"},
      {n:"Isométrie Overcoming",d:"2 × 3 sec",c:"Sous-max (80%)",r:"6",note:"⬇️ Durée réduite"},
      {n:"Tirage d'Épaulé (Clean Pull)",d:"3 × 2",c:"~54kg (45%)",r:"5",note:"⬇️ Pattern uniquement"},
      {n:"Front Squat",d:"3 × 2",c:"89kg (65%)",r:"5–6",note:"⬇️ Décharge"},
      {n:"Dips",d:"2 × 5",c:"+9kg",r:"5",note:"⬇️ Très léger"},
    ]},
    samedi:{icon:"💤",type:"Décharge Haltéro",obj:"Récupération — Préparer le test S6",exs:[
      {n:"🔥 Plyo Haies ~60cm",d:"2 × 5",c:"—",r:"—",note:"⬇️ 10 sauts — maintien pattern"},
      {n:"Arraché Suspension",d:"3 × 2",c:"52kg (60%)",r:"5–6",note:"⬇️ Technique uniquement"},
      {n:"Épaulé-Jeté Technique",d:"3 × 2",c:"~63kg (55%)",r:"5",note:"⬇️ Simple (pas de complexe)"},
      {n:"Tractions Hautes (C2B)",d:"2 × 5",c:"Poids du corps",r:"5",note:"⬇️ PdC uniquement"},
    ]},
  },
  6:{
    lundi:{icon:"🔥",type:"Activation Légère",obj:"Activation pré-test — Léger, frais, qualité maximale",exs:[
      {n:"Tirage d'arraché (Snatch Pull)",d:"3 × 2",c:"60%",r:"5",note:"Activation uniquement"},
      {n:"Box Squat",d:"2 × 2",c:"55%",r:"5",note:"Activation jambes"},
      {n:"Tractions",d:"2 × 5",c:"Léger",r:"5",note:"Activation dos"},
    ]},
    mercredi:{icon:"🏆",type:"TEST — Squat + Tirage Arraché",obj:"🏆 JOUR DE TEST — Squat 1RM + Tirage Arraché Max",exs:[
      {n:"Échauffement progressif",d:"40→50→60→70→80→90%",c:"Progressif",r:"—",note:"Montée soigneuse"},
      {n:"🏆 SQUAT — Test 1RM",d:"Paliers de 2–5kg",c:"Objectif 172–178kg",r:"10",note:"RECORD CIBLE : 172–178kg (+7 à +13kg)"},
      {n:"🏆 Tirage d'Arraché — Test Max",d:"1–2 reps",c:"Max volontaire",r:"10",note:"Évaluer progrès puissance de tirage"},
    ]},
    jeudi:{icon:"💤",type:"Repos",obj:"Repos complet avant le test samedi",exs:[]},
    samedi:{icon:"🏆",type:"TEST — Arraché + Épaulé-Jeté",obj:"🏆 JOUR DE TEST — Records personnels",exs:[
      {n:"🔥 Plyo Haies ~60cm (activation)",d:"2 × 4",c:"—",r:"—",note:"Activation PAP pré-test — 8 sauts"},
      {n:"Échauffement spécifique",d:"Technique + paliers progressifs",c:"Progressif",r:"—",note:"Préparation neurale"},
      {n:"🏆 ARRACHÉ — Test Max",d:"Paliers 1–2kg",c:"Objectif 90–92kg",r:"10",note:"RECORD CIBLE : 90–92kg (+4 à +6kg)"},
      {n:"🏆 ÉPAULÉ-JETÉ — Test Max",d:"Paliers 2–5kg",c:"Objectif 119–122kg",r:"10",note:"RECORD CIBLE : 119–122kg (+4 à +7kg)"},
    ]},
  }
};

const JOURS = ["lundi","mercredi","jeudi","samedi"];
const JLABELS = {lundi:"LUN",mercredi:"MER",jeudi:"JEU",samedi:"SAM"};

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  sem: 1, jour: "lundi", tab: "programme",
  expanded: {}, logs: {}, notes: {}, saveStatus: ""
};

function lKey(s,j,i){ return `${s}_${j}_${i}`; }
function getLog(i){ return state.logs[lKey(state.sem,state.jour,i)] || {}; }
function setLog(i,field,val){
  const k = lKey(state.sem,state.jour,i);
  state.logs[k] = {...(state.logs[k]||{}), [field]: val};
  saveData(); render();
}
function toggleLog(i,status){
  const log = getLog(i);
  setLog(i,"status", log.status === status ? null : status);
}
function getNote(){ return state.notes[`${state.sem}_${state.jour}`] || ""; }
function setNote(v){ state.notes[`${state.sem}_${state.jour}`] = v; saveData(); }

function saveData(){
  try {
    localStorage.setItem("wl_logs", JSON.stringify(state.logs));
    localStorage.setItem("wl_notes", JSON.stringify(state.notes));
    state.saveStatus = "saved";
    clearTimeout(window._saveTimer);
    window._saveTimer = setTimeout(()=>{ state.saveStatus=""; render(); }, 2000);
  } catch(e){ state.saveStatus = "error"; }
}

function loadData(){
  try {
    const l = localStorage.getItem("wl_logs");
    const n = localStorage.getItem("wl_notes");
    if(l) state.logs = JSON.parse(l);
    if(n) state.notes = JSON.parse(n);
  } catch(e){}
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function rpeColor(r){
  if(!r || r==="—") return null;
  const n = parseFloat(r);
  if(n >= 9) return "#EF4444";
  if(n >= 8) return "#D4A843";
  if(n >= 7) return "#6366F1";
  return "#10B981";
}
function rpeBadgeClass(r){
  if(!r || r==="—") return null;
  const n = parseFloat(r);
  if(n>=9) return "badge-rpe-max";
  if(n>=8) return "badge-rpe-high";
  if(n>=7) return "badge-rpe-mid";
  return "badge-rpe-low";
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const si = SEMAINES[state.sem-1];
  const sDay = P[state.sem]?.[state.jour];
  const exs = sDay?.exs || [];
  const total = exs.length;
  const done = exs.filter((_,i)=>getLog(i).status==="fait").length;
  const pct = total ? Math.round(done/total*100) : 0;

  const saveColor = state.saveStatus==="saved" ? "#10B981" : state.saveStatus==="error" ? "#EF4444" : "#555";
  const saveLabel = state.saveStatus==="saved" ? "✓ Sauvegardé" : state.saveStatus==="error" ? "⚠ Erreur" : "";

  let html = `
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Programme 6 Semaines</div>
        <div class="header-name">Force & Explosivité</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="week-badge" style="background:${si.c}18;border-color:${si.c}55">
          <div class="wnum" style="color:${si.c}">S${state.sem}</div>
          <div class="wlabel" style="color:${si.c}">${si.label}</div>
        </div>
        <div style="font-size:10px;color:${saveColor};min-height:14px">${saveLabel}</div>
      </div>
    </div>

    <div class="nav-tabs">
      <button class="nav-tab" onclick="switchTab('programme')" style="background:${state.tab==='programme'?si.c:'#1A1A1A'};color:${state.tab==='programme'?'#000':'#555'}">Programme</button>
      <button class="nav-tab" onclick="switchTab('historique')" style="background:${state.tab==='historique'?si.c:'#1A1A1A'};color:${state.tab==='historique'?'#000':'#555'}">Historique</button>
    </div>

    ${state.tab==="programme" ? `
    <div class="week-tabs">
      ${SEMAINES.map(s=>`
        <button class="week-tab" onclick="setSem(${s.num})"
          style="background:${state.sem===s.num?s.c:'#1A1A1A'};color:${state.sem===s.num?'#000':'#555'}">
          S${s.num}
        </button>`).join("")}
    </div>
    ${total>0?`
    <div class="progress-bar-wrap">
      <div class="progress-labels">
        <span style="letter-spacing:1px">PROGRESSION</span>
        <span style="color:${pct===100?'#10B981':si.c};font-weight:700">${done}/${total} · ${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%;background:${pct===100?'#10B981':si.c}"></div>
      </div>
    </div>`:""}`:""}
  </div>`;

  // JOURS TABS
  if(state.tab==="programme"){
    html += `<div class="day-tabs">`;
    JOURS.forEach(j=>{
      const jExs = P[state.sem]?.[j]?.exs || [];
      const jDone = jExs.filter((_,i)=>state.logs[lKey(state.sem,j,i)]?.status==="fait").length;
      const isAct = j===state.jour;
      html += `<button class="day-tab${jDone===jExs.length&&jExs.length>0?' active':''}" onclick="setJour('${j}')"
        style="border-bottom-color:${isAct?si.c:'transparent'}">
        <div class="dlabel" style="color:${isAct?si.c:'#333'}">${JLABELS[j]}</div>
        ${jExs.length>0?`<div class="dcount" style="color:${jDone===jExs.length?'#10B981':'#2A2A2A'}">${jDone}/${jExs.length}</div>`:''}
      </button>`;
    });
    html += `</div>`;
  }

  html += `<div class="scroll-area">`;

  // ── PROGRAMME ──
  if(state.tab==="programme" && sDay){

    // Session header
    html += `<div class="session-card" style="border-color:${si.c}22">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:5px">
        <span style="font-size:22px">${sDay.icon}</span>
        <div class="s-eyebrow" style="color:${si.c}">${state.jour.toUpperCase()} · ${sDay.type}</div>
      </div>
      <div class="s-obj">${sDay.obj}</div>
      <div class="session-meta">
        <span>RPE cible ${si.rpe}</span>
        <span>${total} exercices</span>
      </div>
    </div>`;

    if(total===0){
      html += `<div class="repos-card">🧘 Repos — récupération active conseillée</div>`;
    }

    // Exercices
    exs.forEach((ex,i)=>{
      const log = getLog(i);
      const exp = state.expanded[`${state.sem}_${state.jour}_${i}`];
      const isTest = ex.n.includes("🏆");
      let cardClass = "ex-card";
      if(log.status==="fait") cardClass+=" done";
      else if(log.status==="partiel") cardClass+=" partial";
      else if(log.status==="non-fait") cardClass+=" missed";
      else if(isTest) cardClass+=" test";

      const rpeClass = rpeBadgeClass(ex.r);

      let statusHtml = `<span class="sp-empty">— À faire</span>`;
      if(log.status==="fait") statusHtml = `<span class="status-pill sp-done">✓ Fait</span>`;
      else if(log.status==="partiel") statusHtml = `<span class="status-pill sp-partial">◐ Partiel</span>`;
      else if(log.status==="non-fait") statusHtml = `<span class="status-pill sp-missed">✗ Non fait</span>`;

      html += `<div class="${cardClass}">
        <div class="ex-header" onclick="toggleEx(${i})">
          <div class="ex-main">
            <div class="ex-name" style="color:${isTest?si.c:'var(--text)'}">${esc(ex.n)}</div>
            <div class="ex-badges">
              <span class="badge badge-detail">${esc(ex.d)}</span>
              <span class="badge badge-charge">${esc(ex.c)}</span>
              ${rpeClass?`<span class="badge ${rpeClass}">RPE ${esc(ex.r)}</span>`:''}
              ${log.chargeRealisee?`<span class="badge badge-done-charge">✓ ${esc(log.chargeRealisee)}</span>`:''}
            </div>
          </div>
          <div class="ex-right">
            ${statusHtml}
            <span class="chevron">${exp?'▲':'▼'}</span>
          </div>
        </div>`;

      if(exp){
        html += `<div class="ex-body">`;
        if(ex.note) html += `<div class="coach-note" style="border-color:${si.c}55">${esc(ex.note)}</div>`;

        html += `<div class="inputs-grid">
          <div class="input-group">
            <label>Charge réalisée</label>
            <input type="text" placeholder="ex: 68kg" value="${esc(log.chargeRealisee||'')}"
              oninput="updateLog(${i},'chargeRealisee',this.value)">
          </div>
          <div class="input-group">
            <label>RPE ressenti</label>
            <input type="number" min="1" max="10" placeholder="1–10" value="${esc(log.rpeRessenti||'')}"
              oninput="updateLog(${i},'rpeRessenti',this.value)">
          </div>
        </div>
        <div class="input-group input-full">
          <label>Ressenti / Commentaire</label>
          <textarea rows="2" placeholder="Sensations, ajustements techniques..."
            oninput="updateLog(${i},'commentaire',this.value)">${esc(log.commentaire||'')}</textarea>
        </div>
        <div class="status-btns">
          <button class="status-btn${log.status==='fait'?' active-done':''}" onclick="toggleLog(${i},'fait')">✓ Fait</button>
          <button class="status-btn${log.status==='partiel'?' active-partial':''}" onclick="toggleLog(${i},'partiel')">◐ Partiel</button>
          <button class="status-btn${log.status==='non-fait'?' active-missed':''}" onclick="toggleLog(${i},'non-fait')">✗ Non fait</button>
        </div>
        </div>`;
      }

      html += `</div>`;
    });

    // Note de séance
    if(total>0){
      html += `<div class="session-note-card">
        <label>📝 Note de séance</label>
        <textarea rows="3" placeholder="Ressenti général, fatigue, points à corriger..."
          oninput="setNoteVal(this.value)">${esc(getNote())}</textarea>
      </div>`;
    }

    // Objectifs (S1 lundi)
    if(state.sem===1 && state.jour==="lundi"){
      html += `<div class="objectifs-card">
        <div class="oc-title">Objectifs du Cycle</div>
        <div class="objectifs-grid">
          ${[
            {l:"Arraché",a:"86kg",t:"90–92kg"},
            {l:"Épaulé-Jeté",a:"115kg",t:"119–122kg"},
            {l:"Squat",a:"165kg",t:"172–178kg"},
            {l:"Ratio Arr./Squat",a:"52%",t:">54%"},
          ].map(o=>`<div class="obj-item">
            <div class="obj-label">${o.l}</div>
            <div class="obj-current">${o.a}</div>
            <div class="obj-target">→ ${o.t}</div>
          </div>`).join("")}
        </div>
      </div>`;
    }
  }

  // ── HISTORIQUE ──
  if(state.tab==="historique"){
    const sessions = [];
    for(let s=1;s<=6;s++){
      for(const j of JOURS){
        const jExs = P[s]?.[j]?.exs || [];
        const hasData = jExs.some((_,i)=>state.logs[lKey(s,j,i)]?.status);
        if(hasData){
          const jDone = jExs.filter((_,i)=>state.logs[lKey(s,j,i)]?.status==="fait").length;
          sessions.push({s,j,exs:jExs,done:jDone});
        }
      }
    }

    if(sessions.length===0){
      html += `<div class="empty-state">Aucune séance enregistrée<p>Commence à remplir ton programme !</p></div>`;
    }

    sessions.forEach(({s,j,exs,done})=>{
      const sw = SEMAINES[s-1];
      const prog = P[s]?.[j];
      const note = state.notes[`${s}_${j}`];
      const pct2 = Math.round(done/exs.length*100);
      const charges = exs.map((_,i)=>{
        const l = state.logs[lKey(s,j,i)];
        return l?.chargeRealisee ? {nom:exs[i].n,c:l.chargeRealisee} : null;
      }).filter(Boolean).slice(0,4);

      html += `<div class="hist-card" style="border-color:${sw.c}22" onclick="goToSession(${s},'${j}')">
        <div class="hist-top">
          <div>
            <div class="hist-label" style="color:${sw.c}">S${s} — ${JLABELS[j]}</div>
            <div class="hist-type">${prog?.icon} ${prog?.type}</div>
          </div>
          <div>
            <div class="hist-pct" style="color:${pct2===100?'#10B981':sw.c}">${pct2}%</div>
            <div class="hist-sub">${done}/${exs.length}</div>
          </div>
        </div>
        ${note?`<div class="hist-note" style="border-color:${sw.c}44">${esc(note.slice(0,120))}${note.length>120?"...":""}</div>`:""}
        ${charges.length>0?`<div class="hist-charges">${charges.map(c=>`<span class="hist-charge-tag">${esc(c.nom.split(" ").slice(0,2).join(" "))}: ${esc(c.c)}</span>`).join("")}</div>`:""}
      </div>`;
    });
  }

  html += `</div></div>`;
  document.getElementById("app").innerHTML = html;
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function setSem(s){ state.sem=s; state.jour="lundi"; state.expanded={}; render(); }
function setJour(j){ state.jour=j; state.expanded={}; render(); }
function switchTab(t){ state.tab=t; render(); }
function toggleEx(i){
  const k=`${state.sem}_${state.jour}_${i}`;
  state.expanded[k]=!state.expanded[k];
  render();
}
function updateLog(i,field,val){ setLog(i,field,val); }
function setNoteVal(v){ setNote(v); }
function goToSession(s,j){ state.sem=s; state.jour=j; state.tab="programme"; render(); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
render();
</script>
</body>
</html>
